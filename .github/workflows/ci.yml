# Назначение файла: базовый workflow для запуска проверок lint/typecheck/test/semgrep
# + добавлен быстрый батч ci_fast (lint → unit → build) для экономии времени.
name: CI

on:
  push:
    branches: [main, work, staging]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # 🔹 Быстрый батч: один прогон вместо россыпи команд (линт → unit → build)
  ci_fast:
    name: ci:fast
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # pnpm (чёткая версия и кеширование)
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Включение corepack
        run: corepack enable

      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile

      - name: Быстрый цикл (lint → unit → build + docs QA)
        run: pnpm run ci:fast

      - name: Сохранить артефакты (линт/юнит-репорты)
        uses: actions/upload-artifact@v4
        with:
          name: ci-fast-artifacts
          path: artifacts
          if-no-files-found: ignore

  # 🔹 Твои существующие джобы оставляем (можно будет отключить позже, когда убедимся в стабильности ci_fast).

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Включение corepack
        run: corepack enable
      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile
      - name: Запуск линтера
        run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Включение corepack
        run: corepack enable
      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile
      - name: Проверка типов
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Включение corepack
        run: corepack enable
      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile
      - name: Запуск тестов
        env:
          CI: true
        run: pnpm test

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Включение corepack
        run: corepack enable
      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile
      - name: Запуск Semgrep
        env:
          CI: true
        run: pnpm semgrep
